  # ─────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────
  api-gateway:
    build:
      context: ./revplay-api-gateway
      dockerfile: Dockerfile
    container_name: revplay-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: cmV2cGxheV9zdXBlcl9zZWNyZXRfa2V5X2Zvcl9qd3RfMjAyNF92ZXJ5X2xvbmc=
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_started
      artist-service:
        condition: service_started
      music-service:
        condition: service_started
      playlist-service:
        condition: service_started
      favorites-service:
        condition: service_started
      history-service:
        condition: service_started
      analytics-service:
        condition: service_started
    networks:
      - revplay-network

  # ─────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./revplay-frontend
      dockerfile: Dockerfile
    container_name: revplay-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - revplay-network

# ─────────────────────────────────────
# Networks
# ─────────────────────────────────────
networks:
  revplay-network:
    driver: bridge

# ─────────────────────────────────────
# Volumes
# ─────────────────────────────────────
volumes:
  mysql_data:
    driver: local
