server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # this is server itself
    # so it should NOT register itself
    register-with-eureka: false
    # should NOT fetch registry
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

  server:
    # wait time before removing
    # unavailable services
    eviction-interval-timer-in-ms: 5000
    # disable self preservation
    # in development mode
    enable-self-preservation: false

# actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"